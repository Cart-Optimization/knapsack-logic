services:
  - type: web
    name: flavourscout
    runtime: docker
    plan: free
    healthCheckPath: /api/me
    envVars:
      - key: SESSION_SECRET
        generateValue: true            # Render generates a stable random secret
      - key: BASE_URL
        sync: false                    # set to your https URL after first deploy (for OAuth)
      - key: SWIGGY_CLIENT_ID
        sync: false                    # optional: pre-registered OAuth client id

# NOTE: Render's free tier has an ephemeral filesystem and no persistent disks,
# so the coupon ledger + sessions reset on restart/redeploy (fine for the demo —
# it needs no persistence). COUPON_DB / SESSION_FILE default to /data via the
# Dockerfile. For durability, move to a paid plan and add:
#   disk:
#     name: flavourscout-data
#     mountPath: /data
#     sizeGB: 1
